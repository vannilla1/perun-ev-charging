services:
  - type: web
    name: perun-ev-charging
    runtime: node
    region: frankfurt
    plan: free
    nodeVersion: "22"
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # KRITICKÉ: bez JWT_SECRET app v produkcii odmietne bootnúť (fail-closed).
      # Predtým padla na verejne známy default secret = úplný auth bypass.
      - key: JWT_SECRET
        generateValue: true
      # Voliteľné: admin kľúč pre zápisy do QR mappings (x-admin-key header)
      - key: ADMIN_API_KEY
        generateValue: true
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: NEXT_PUBLIC_SMARTME_CLIENT_ID
        sync: false
      - key: SMARTME_CLIENT_SECRET
        sync: false
      - key: NEXT_PUBLIC_ECARUP_CLIENT_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: perun-electromobility
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
